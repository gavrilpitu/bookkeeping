<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GPC Bookkeeping</title>
    <script>
      // GitHub Pages SPA redirect: encode the full path into the query string
      // so index.html can restore it before React Router initializes.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
      );
    </script>
  </head>
  <body></body>
</html>
